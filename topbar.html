<!-- topbar.html -->
<div class="topbar" role="contentinfo" aria-label="Date, location, and local time">
    <div class="topbar-inner">
        <span class="topbar-item">
            <i class="fa-regular fa-calendar" aria-hidden="true"></i>
            <span id="buildDate"></span>
        </span>
        <span class="topbar-divider" aria-hidden="true"></span>
        <span class="topbar-item">
            <img src="https://flagcdn.com/w20/de.png" width="14" alt="DE flag" loading="lazy">
            <span>Germany</span>
        </span>
        <span class="topbar-divider" aria-hidden="true"></span>
        <span class="topbar-item">
            <i class="fa-regular fa-clock" aria-hidden="true"></i>
            <time id="navLocalTime" datetime="">--:--</time>
            <span class="topbar-tz" id="navTimezone"></span>
        </span>
    </div>
</div>
